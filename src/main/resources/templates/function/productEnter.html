<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>상품 등록</title>
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/function/productEnter.css">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="product-enter-main">
    <div class="product-enter-wrap">
        <section class="product-enter-card">
            <div class="title-box">
                <h1>상품 등록</h1>
                <p>판매할 상품 정보를 입력해주세요.</p>
            </div>

            <form action="/productEnter" method="post" class="product-form" enctype="multipart/form-data">
                <div class="form-row">
                    <label for="name">상품명</label>
                    <input type="text" id="name" name="name" placeholder="상품명을 입력하세요">
                </div>

                <div class="form-row">
                    <label for="price">가격</label>
                    <input type="number" id="price" name="price" placeholder="가격을 입력하세요">
                </div>

                <div class="form-row">
                    <label for="stockQuantity">재고</label>
                    <input type="number" id="stockQuantity" name="stockQuantity" placeholder="재고 수량을 입력하세요">
                </div>

                <div class="form-row">
                    <label for="imageFile">상품 이미지</label>

                    <div class="file-upload-box">
                        <label for="imageFile" class="file-upload-btn">파일 선택</label>
                        <span id="file-name" class="file-upload-name">선택된 파일 없음</span>
                    </div>

                    <input
                            type="file"
                            id="imageFile"
                            name="imageFile"
                            accept="image/*"
                            class="hidden-file-input"
                    >
                </div>

                <div class="form-row">
                    <label for="description">상품 설명</label>
                    <textarea id="description" name="description" placeholder="상품 설명을 입력하세요"></textarea>
                </div>

                <div class="button-box">
                    <button type="submit" class="submit-btn">상품 등록</button>
                    <a href="/home" class="cancel-btn">취소</a>
                </div>
            </form>
        </section>
    </div>
</main>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const input = document.getElementById("imageFile");
        const fileName = document.getElementById("file-name");

        if (input && fileName) {
            input.addEventListener("change", function () {
                if (this.files && this.files.length > 0) {
                    fileName.textContent = this.files[0].name;
                } else {
                    fileName.textContent = "선택된 파일 없음";
                }
            });
        }
    });
</script>

</body>
</html>
