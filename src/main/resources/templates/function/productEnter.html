<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>상품 등록</title>
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/function/productEnter.css">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="product-enter-main">
    <div class="product-enter-wrap">
        <section class="product-enter-card">
            <div class="title-box">
                <h1>상품 등록</h1>
                <p>판매할 상품 정보를 입력해주세요.</p>
            </div>

            <form action="/productEnter" method="post" class="product-form">
                <div class="form-row">
                    <label for="name">상품명</label>
                    <input type="text" id="name" name="name" placeholder="상품명을 입력하세요">
                </div>

                <div class="form-row">
                    <label for="price">가격</label>
                    <input type="number" id="price" name="price" placeholder="가격을 입력하세요">
                </div>

                <div class="form-row">
                    <label for="stock">재고</label>
                    <input type="number" id="stock" name="stock" placeholder="재고 수량을 입력하세요">
                </div>

                <div class="form-row">
                    <label for="category">카테고리</label>
                    <select id="category" name="category">
                        <option value="">카테고리 선택</option>
                        <option value="top">상의</option>
                        <option value="bottom">하의</option>
                        <option value="shoes">신발</option>
                        <option value="accessory">악세서리</option>
                    </select>
                </div>

                <div class="form-row">
                    <label for="imageUrl">상품 이미지 URL</label>
                    <input type="text" id="imageUrl" name="imageUrl" placeholder="이미지 주소를 입력하세요">
                </div>

                <div class="form-row">
                    <label for="description">상품 설명</label>
                    <textarea id="description" name="description" placeholder="상품 설명을 입력하세요"></textarea>
                </div>

                <div class="button-box">
                    <button type="submit" class="submit-btn">상품 등록</button>
                    <a href="/" class="cancel-btn">취소</a>
                </div>
            </form>
        </section>
    </div>
</main>

</body>
</html>
