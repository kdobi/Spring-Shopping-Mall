<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>장바구니</title>

    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/function/cart.css">

</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="cart-container">

    <h1 class="cart-title">장바구니</h1>

    <table class="cart-table">

        <thead>
        <tr>
            <th>상품</th>
            <th>가격</th>
            <th>수량</th>
            <th>합계</th>
            <th></th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="cart : ${cartItems}">

            <td class="cart-product">

                <img th:src="${cart.product.imagePath}" class="cart-img">

                <span th:text="${cart.product.name}"></span>

            </td>

            <td>
                <span th:text="${cart.product.price}"></span>원
            </td>

            <td>
                <input type="number"
                       min="1"
                       th:value="${cart.quantity}"
                       class="quantity-input">
            </td>

            <td>
                <span th:text="${cart.product.price * cart.quantity}"></span>원
            </td>

            <td>

                <form th:action="@{/cart/remove/{id}(id=${cart.product.id})}" method="post">
                    <button class="delete-btn">삭제</button>
                </form>

            </td>

        </tr>

        </tbody>

    </table>

    <div class="cart-summary">

        <span>총 금액</span>

        <span class="total-price"
              th:text="${totalPrice} + '원'"></span>

    </div>

    <div class="cart-buttons">

        <button class="continue-btn"
                onclick="location.href='/products'">
            쇼핑 계속하기
        </button>

        <button class="order-btn">
            주문하기
        </button>

    </div>

</div>

</body>
</html>
