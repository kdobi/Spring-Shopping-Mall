<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <link rel="stylesheet" href="/css/product-detail.css">

</head>

<body>

<div class="product-detail-container">

    <div class="product-detail-wrapper">

        <div class="product-image">

            <!-- 이미지 있을 때 -->
            <img th:if="${product.imagePath != null and !#strings.isEmpty(product.imagePath)}"
                 th:src="${product.imagePath}">

            <!-- 이미지 없을 때 -->
            <div class="no-image"
                 th:if="${product.imagePath == null or #strings.isEmpty(product.imagePath)}">
                이미지 없음
            </div>

        </div>

        <div class="product-info">

            <h1 class="product-name"
                th:text="${product.name}">
            </h1>

            <p class="product-price">
                <span th:text="${product.price}"></span>원
            </p>

            <p class="product-stock">
                재고 :
                <span th:text="${product.stockQuantity}"></span>
            </p>

            <p class="product-description"
               th:text="${product.description}">
            </p>

            <div class="product-buttons">
                <button class="cart-btn">장바구니 담기</button>
                <button class="buy-btn">구매하기</button>
            </div>

        </div>

    </div>

</div>

</body>
</html>
