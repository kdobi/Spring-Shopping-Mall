<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Spring Shopping Mall</title>
    <link rel="stylesheet" href="/css/home.css">
    <link rel="stylesheet" href="/css/common.css">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="main">

    <section class="hero">
        <div class="welcome-box">
            <p class="welcome-text">환영합니다, <span class="user-name">사용자님</span></p>
            <h1>오늘도 원하는 상품을 편하게 둘러보세요</h1>
            <p class="hero-description">
                상품 조회부터 구매, 내가 등록하고 판매까지<br>
                한 번에 이용할 수 있는 간단한 쇼핑몰 메인 페이지입니다.
            </p>
        </div>

        <div class="hero-buttons">
            <a href="/products" class="primary-btn">상품 보러가기</a>
            <a href="/cart" class="secondary-btn">장바구니 보기</a>
        </div>
    </section>

    <section class="quick-menu-section">
        <h2 class="part2">바로가기</h2>

        <div class="quick-menu-grid">
            <a href="/productSearch" class="quick-card">
                <h3>상품검색</h3>
                <p>등록된 상품 목록을 확인하고 상품을 구매합니다.</p>
            </a>

            <a href="/productEnter" class="quick-card">
                <h3>상품등록</h3>
                <p>새로운 상품을 직접 등록하고 판매할 수 있습니다.</p>
            </a>

            <a href="/cart" class="quick-card">
                <h3>장바구니</h3>
                <p>담아둔 상품과 수량을 확인하고 주문으로 연결합니다.</p>
            </a>

            <a href="/orders" class="quick-card">
                <h3>주문내역</h3>
                <p>지금까지 주문한 상품 목록과 주문 기록을 확인합니다.</p>
            </a>

        </div>
    </section>

</main>

</body>
</html>
